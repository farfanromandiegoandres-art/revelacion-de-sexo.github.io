<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación Especial</title>
    <style>
        /* Ajustes para pantalla completa en móviles */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #fdf4f7; /* Color suave de fondo */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 450px; /* Tamaño máximo para tablets, pero se adapta a celulares */
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Contenedor del Video */
        .video-section {
            width: 100%;
            position: relative;
            background-color: #000;
            line-height: 0;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Área de Interacción */
        .content-section {
            flex-grow: 1;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            background: linear-gradient(to bottom, #ffffff, #fef9fb);
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            margin-top: -20px; /* Efecto de superposición sobre el video */
            position: relative;
            z-index: 10;
        }

        /* Estilo de Botones tipo App */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 65px; /* Más alto para facilitar el toque */
            text-decoration: none;
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            border-radius: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn svg {
            width: 26px;
            height: 26px;
            margin-right: 15px;
            fill: currentColor;
        }

        /* Azul Stitch */
        .btn-wa {
            background: linear-gradient(135deg, #0076f5 0%, #00a1ff 100%);
        }

        /* Rosa Ángel */
        .btn-map {
            background: linear-gradient(135deg, #ff5e9e 0%, #ff92bc 100%);
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #b58da3;
            font-style: italic;
        }
    </style>
</head>
<body>
